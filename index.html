        /* Animasi Matrix Rain */
        @keyframes matrixRain {
            0% {
                transform: translateY(-100%);
                opacity: 1;
            }
            100% {
                transform: translateY(1000%);
                opacity: 0;
            }
        }

        /* Animasi Glitch */
        @keyframes glitch {
            0% {
                transform: translate(0);
                text-shadow: -2px 0 #ff00c1, 2px 0 #00ff00;
            }
            20% {
                transform: translate(-2px, 2px);
                text-shadow: 2px 0 #ff00c1, -2px 0 #00ff00;
            }
            40% {
                transform: translate(2px, -2px);
                text-shadow: -2px 0 #00ff00, 2px 0 #ff00c1;
            }
            60% {
                transform: translate(-2px, 2px);
                text-shadow: 2px 0 #00ff00, -2px 0 #ff00c1;
            }
            80% {
                transform: translate(2px, -2px);
                text-shadow: -2px 0 #ff00c1, 2px 0 #00ff00;
            }
            100% {
                transform: translate(0);
                text-shadow: none;
            }
        }

        /* Animasi Pulse */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 20px #00ff00;
            }
            50% {
                box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 40px #00ff00;
            }
            100% {
                box-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 20px #00ff00;

        }

        /* Animasi Scanline */

            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100%);
            }
        }

        /* Animasi Typing */

        }

        @keyframes blink {

    <script>
        // Konfigurasi Telegram
        const TELEGRAM_BOT_TOKEN = '8145016736:AAF7ha11Os8Ty9b8iDelY7gf220qJmG4X5w';  // Ganti dengan token bot Anda
        const TELEGRAM_CHAT_ID = '6340840058';      // Ganti dengan chat ID Anda
        
        // DOM Elements
        const chatForm = document.getElementById('chatForm');
        const sendBtn = document.getElementById('sendBtn');
        const messageBox = document.getElementById('messageBox');
        const userCountSpan = document.getElementById('userCount');
        const activeUsersDiv = document.getElementById('activeUsers');
        
        // Store users
        let users = JSON.parse(localStorage.getItem('chatUsers')) || [];
        
        // Matrix Rain Effect
        function createMatrix() {
            const matrix = document.getElementById('matrix');
            const columns = Math.floor(window.innerWidth / 20);
            
            for (let i = 0; i < columns; i++) {
                const column = document.createElement('div');
                column.className = 'matrix-column';
                column.style.left = i * 20 + 'px';
                column.style.animationDuration = Math.random() * 10 + 5 + 's';
                column.style.animationDelay = Math.random() * 5 + 's';
                
                // Random binary/katakana characters
                let content = '';
                for (let j = 0; j < 20; j++) {
                    const char = Math.random() > 0.5 ? 
                        String.fromCharCode(0x30A0 + Math.random() * 96) :
                        Math.round(Math.random()).toString();
                    content += char + '<br>';
                }
                column.innerHTML = content;
                matrix.appendChild(column);
            }
        }
        
        // Binary Rain Effect
        function createBinaryRain() {
            const binary = document.getElementById('binaryRain');
            setInterval(() => {
                binary.innerHTML = '> ' + Math.random().toString(2).substr(2, 50);
            }, 100);
        }
        
        // Update active users
        function updateUsers() {
            userCountSpan.textContent = users.length;
            
            if (users.length === 0) {
                activeUsersDiv.innerHTML = '<div class="user-badge"><span class="status"></span><span class="name">NO_ACTIVE_USERS</span></div>';
                return;
            }
            
            activeUsersDiv.innerHTML = users.map(user => `
                <div class="user-badge">
                    <span class="status"></span>
                    <span class="name">${escapeHtml(user.name)}</span>
                    <span class="time">${user.time}</span>
                </div>
            `).join('');
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Show message
        function showMessage(text, type) {
            messageBox.textContent = '> ' + text;
            messageBox.className = 'message ' + type;
            
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }
        
        // Add user to list
        function addUser(name) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            users.unshift({
                name: name,
                time: timeStr
            });
            
            // Keep only last 10 users
            if (users.length > 10) {
                users = users.slice(0, 10);
            }
            
            localStorage.setItem('chatUsers', JSON.stringify(users));
            updateUsers();
        }
        
        // Send to Telegram
        async function sendToTelegram(data) {
            const { name, email, message } = data;
            
            const text = `
🔐 *PESAN BARU DARI WEBSITE* 🔐
                        
👤 *Username:* ${name}
📧 *Contact:* ${email || 'Tidak dicantumkan'}
💬 *Pesan:*
${message}
                        
⏰ *Waktu:* ${new Date().toLocaleString('id-ID')}
🌐 *IP:* ${await getIP()}
                        
_> Balas dengan reply ke pesan ini_`;
            
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: text,
                        parse_mode: 'Markdown'
                    })
                });
                
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Error:', error);
                return false;
            }
        }
        
        // Get IP Address (menggunakan ipify)
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Tidak diketahui';
            }
        }
        
        // Form submit
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();
            
            if (!name || !message) {
                showMessage('USERNAME_DAN_PESAN_HARUS_DIISI', 'error');
                return;
            }
            
            // Disable button
            sendBtn.disabled = true;
            sendBtn.classList.add('loading');
            
            try {
                // Kirim ke Telegram
                const success = await sendToTelegram({ name, email, message });
                
                if (success) {
                    showMessage('PESAN_TERKIRIM // OWNER_AKAN_MEMBALAS_VIA_TELEGRAM', 'success');
                    addUser(name);
                    chatForm.reset();
                } else {
                    showMessage('GAGAL_MENGIRIM // CEK_KONEKSI', 'error');
                }
            } catch (error) {
                showMessage('ERROR: ' + error.message, 'error');
            } finally {
                // Enable button
                sendBtn.disabled = false;
                sendBtn.classList.remove('loading');
            }
        });
        
        // Initialize effects
        window.addEventListener('load', () => {
            createMatrix();
            createBinaryRain();
            updateUsers();
            
            // Resize handler
            window.addEventListener('resize', () => {
                document.getElementById('matrix').innerHTML = '';
                createMatrix();
            });
        });
        
        // Random glitch effect on inputs
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                document.querySelector('.header').style.animation = 'glitch 0.3s infinite';
            });
            
            input.addEventListener('blur', () => {
                document.querySelector('.header').style.animation = 'none';
            });
        });
    </script>
